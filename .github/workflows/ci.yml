name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore MailClient.sln

      - name: Build
        run: dotnet build MailClient.sln --no-restore --configuration Release

      - name: Check formatting
        run: dotnet format MailClient.sln --verify-no-changes --no-restore

      - name: Test
        run: dotnet test MailClient.sln --no-build --configuration Release --verbosity normal
